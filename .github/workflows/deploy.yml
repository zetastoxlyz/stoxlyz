name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run generate

      - name: Deploy via SFTP
        uses: easingthemes/ssh-deploy@v4
        with:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.HOSTINGER_SFTP_HOST }}
          REMOTE_USER: ${{ secrets.HOSTINGER_SFTP_USERNAME }}
          REMOTE_PORT: ${{ secrets.HOSTINGER_SFTP_PORT }}
          SOURCE: 'dist/'
          TARGET: 'public_html/'
          ARGS: '-avz --delete'
